<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillBridge - Tutorials & Exams</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #1a1a2e 50%, #16213e 100%);
            color: #ffffff;
            min-height: 100vh;
        }

        .navbar {
            background: rgba(15, 12, 41, 0.95);
            backdrop-filter: blur(12px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(78, 205, 196, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .logo i {
            color: #4ecdc4;
            margin-right: 10px;
        }

        .nav-links {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: #e0e0e0;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .nav-links a:hover, .nav-links a.active {
            background: rgba(78, 205, 196, 0.2);
            color: #4ecdc4;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            padding: 0.7rem 2.5rem 0.7rem 1.2rem;
            border-radius: 50px;
            border: 1px solid rgba(78, 205, 196, 0.3);
            background: rgba(255, 255, 255, 0.08);
            color: white;
            width: 220px;
        }

        .search-box input:focus {
            width: 280px;
            border-color: #4ecdc4;
            outline: none;
        }

        .search-box i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #4ecdc4;
        }

        .auth-btn {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            border: none;
            color: white;
            transition: all 0.3s;
        }

        .auth-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(78, 205, 196, 0.3);
        }

        .menu-toggle {
            display: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #4ecdc4;
        }

        .page-header {
            text-align: center;
            padding: 2rem;
            background: radial-gradient(ellipse at 30% 40%, rgba(78, 205, 196, 0.08), transparent 70%);
        }

        .page-header h1 {
            font-size: 2rem;
        }

        .page-header p {
            color: #ccc;
        }

        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 2rem 0;
            flex-wrap: wrap;
        }

        .filter-chip {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-chip.active, .filter-chip:hover {
            background: #4ecdc4;
            color: #1a1a2e;
        }

        .tutorials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .tutorial-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s;
            border: 1px solid rgba(78, 205, 196, 0.15);
            position: relative;
        }

        .tutorial-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(78, 205, 196, 0.4);
        }

        .card-image {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .card-image i {
            font-size: 4rem;
            color: white;
        }

        .favorite-heart {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 10;
        }

        .favorite-heart i {
            font-size: 1.2rem;
            color: #ff6b6b;
            transition: all 0.2s;
        }

        .favorite-heart:hover {
            transform: scale(1.1);
            background: rgba(0, 0, 0, 0.8);
        }

        .exam-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: #ff6b6b;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .card-content {
            padding: 1.5rem;
        }

        .card-title {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
            padding-right: 30px;
        }

        .level-badge {
            display: inline-block;
            background: rgba(78, 205, 196, 0.2);
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.7rem;
        }

        .card-description {
            color: #ccc;
            font-size: 0.9rem;
            margin: 0.8rem 0;
            line-height: 1.4;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .duration {
            font-size: 0.8rem;
            color: #4ecdc4;
        }

        .start-btn, .exam-btn {
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            margin-left: 0.5rem;
        }

        .start-btn {
            background: #4ecdc4;
            color: #1a1a2e;
        }

        .exam-btn {
            background: #ffa502;
            color: #1a1a2e;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1a1a2e;
            padding: 2rem;
            border-radius: 20px;
            max-width: 700px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(78, 205, 196, 0.3);
        }

        .close {
            float: right;
            font-size: 1.5rem;
            cursor: pointer;
            color: #888;
        }

        .close:hover {
            color: #ff6b6b;
        }

        .code-block {
            background: #0a0a1a;
            padding: 1rem;
            border-radius: 10px;
            margin: 1rem 0;
        }

        .code-block pre {
            color: #4ecdc4;
            margin: 0;
            font-family: monospace;
            white-space: pre-wrap;
        }

        .quiz-container {
            padding: 1rem;
        }

        .question {
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .question-text {
            font-weight: bold;
            margin-bottom: 0.8rem;
            color: #4ecdc4;
        }

        .option {
            display: block;
            margin: 0.5rem 0;
            padding: 0.5rem;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .option:hover {
            background: rgba(78, 205, 196, 0.2);
        }

        .option input {
            margin-right: 0.5rem;
            cursor: pointer;
        }

        .submit-exam-btn {
            background: #4ecdc4;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
            width: 100%;
        }

        .result-area {
            text-align: center;
            padding: 1rem;
            border-radius: 10px;
            margin-top: 1rem;
        }

        .result-pass {
            background: rgba(46, 204, 113, 0.2);
            border: 1px solid #2ecc71;
        }

        .result-fail {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid #e74c3c;
        }

        .certificate {
            text-align: center;
            padding: 2rem;
            background: linear-gradient(135deg, #f9f9f9, #e8e8e8);
            border-radius: 15px;
            margin-top: 1rem;
            color: #1a1a2e;
        }

        .certificate h3 {
            color: #e67e22;
        }

        .certificate .gold {
            font-size: 3rem;
            color: #f1c40f;
        }

        .score-text {
            font-size: 2rem;
            font-weight: bold;
            margin: 1rem 0;
        }

        @keyframes confetti {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(100vh); opacity: 0; }
        }

        .auth-tabs {
            display: flex;
            gap: 1rem;
            margin: 1rem 0;
            border-bottom: 1px solid rgba(78, 205, 196, 0.2);
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 0.5rem 1rem;
            cursor: pointer;
            color: #888;
        }

        .tab-btn.active {
            color: #4ecdc4;
            border-bottom: 2px solid #4ecdc4;
        }

        input {
            width: 100%;
            padding: 0.8rem;
            margin: 0.5rem 0;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(78, 205, 196, 0.3);
            border-radius: 10px;
            color: white;
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            border: none;
            padding: 0.8rem;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
            color: white;
        }

        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #4ecdc4;
            color: #1a1a2e;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            z-index: 10000;
            animation: slideIn 0.3s ease;
            font-weight: bold;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
                width: 100%;
                flex-direction: column;
                text-align: center;
                margin-top: 1rem;
            }
            .nav-links.show {
                display: flex;
            }
            .menu-toggle {
                display: block;
            }
            .tutorials-grid {
                grid-template-columns: 1fr;
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <i class="fas fa-bridge"></i>
            <span>SkillBridge</span>
        </div>
        <div class="nav-links">
            <a href="index.html">🏠 Home</a>
            <a href="tutorials.html" class="active">📚 Tutorials</a>
            <a href="playground.html">💻 Playground</a>
            <a href="community.html">💬 Community</a>
            <a href="#" onclick="openFavoritesModal(); return false;">❤️ My Favorites</a>
            
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search tutorials...">
            <i class="fas fa-search"></i>
        </div>
        <div id="authButton" class="auth-btn" onclick="showAuthModal()">
            <i class="fas fa-sign-in-alt"></i> Login
        </div>
        <div class="menu-toggle" onclick="toggleMenu()">
            <i class="fas fa-bars"></i>
        </div>
    </nav>

    <div class="page-header">
        <h1><i class="fas fa-graduation-cap"></i> Learn & Test Your Skills</h1>
        <p>Complete lessons, take exams, and earn certificates!</p>
    </div>

    <div class="filter-bar">
        <button class="filter-chip active" data-category="all">All</button>
        <button class="filter-chip" data-category="frontend">🎨 Frontend</button>
        <button class="filter-chip" data-category="backend">⚙️ Backend</button>
        <button class="filter-chip" data-category="database">🗄️ Database</button>
        <button class="filter-chip" data-category="dsa">📊 DSA</button>
    </div>

    <div id="tutorialsContainer" class="tutorials-grid"></div>

    <!-- Floating Favorites Icon -->
    <div class="floating-fav" style="position: fixed; bottom: 100px; right: 25px; z-index: 99;">
        <button class="floating-fav-btn" onclick="openFavoritesModal()" style="background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); border: 1px solid #ff6b6b; border-radius: 50px; padding: 0.7rem 1.2rem; cursor: pointer; color: white; display: flex; align-items: center; gap: 8px; position: relative;">
            <i class="fas fa-heart"></i> Favorites
            <span id="favCountBadge" style="position: absolute; top: -8px; right: -8px; background: #ff6b6b; border-radius: 50%; width: 20px; height: 20px; font-size: 0.7rem; display: flex; align-items: center; justify-content: center;">0</span>
        </button>
    </div>

    <!-- Favorites Modal -->
    <div id="favoritesModal" class="modal">
        <div class="modal-content" style="max-width: 500px;">
            <span class="close" onclick="closeFavoritesModal()">&times;</span>
            <h2><i class="fas fa-heart"></i> My Favorites</h2>
            <div id="favoritesList" style="max-height: 400px; overflow-y: auto;"></div>
        </div>
    </div>

    <!-- Lesson Modal -->
    <div id="lessonModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeLessonModal()">&times;</span>
            <h2 id="lessonTitle">Lesson</h2>
            <div id="lessonContent"></div>
            <button class="submit-btn" onclick="closeLessonModal()">Close Lesson</button>
        </div>
    </div>

    <!-- Exam Modal -->
    <div id="examModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeExamModal()">&times;</span>
            <h2 id="examTitle"><i class="fas fa-pencil-alt"></i> Course Exam</h2>
            <div id="examContent" class="quiz-container"></div>
        </div>
    </div>

    <!-- Auth Modal -->
    <div id="authModal" class="modal">
        <div class="modal-content" style="max-width:400px">
            <span class="close" onclick="closeAuthModal()">&times;</span>
            <h2>SkillBridge Account</h2>
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="showLogin()">Login</button>
                <button class="tab-btn" onclick="showSignup()">Sign Up</button>
            </div>
            <div id="loginForm">
                <input type="text" id="loginUsername" placeholder="Username">
                <input type="password" id="loginPassword" placeholder="Password">
                <button onclick="login()" class="submit-btn">Login</button>
            </div>
            <div id="signupForm" style="display:none">
                <input type="text" id="signupUsername" placeholder="Username">
                <input type="password" id="signupPassword" placeholder="Password">
                <button onclick="signup()" class="submit-btn">Create Account</button>
            </div>
        </div>
    </div>

    <script>
        // ========== TUTORIALS WITH COMPLETE LESSONS AND EXAMS ==========
        const tutorials = [
            {
                id: 1,
                title: "Data Structures & Algorithms",
                category: "dsa",
                icon: "fas fa-code-branch",
                description: "Master arrays, linked lists, trees, sorting, and searching. Essential for coding interviews!",
                duration: "8 hours",
                level: "Advanced",
                fullLesson: `
                    <h2>📊 Data Structures & Algorithms</h2>
                    <h3>1. Arrays</h3>
                    <div class="code-block"><pre><code>arr = [10, 20, 30, 40, 50]
print(arr[0])  # Output: 10
arr.append(60)  # Add element</code></pre></div>
                    <h3>2. Linked Lists</h3>
                    <div class="code-block"><pre><code>class Node:
    def __init__(self, data):
        self.data = data
        self.next = None

# Create linked list
head = Node(10)
head.next = Node(20)
head.next.next = Node(30)</code></pre></div>
                    <h3>3. Stacks (LIFO)</h3>
                    <div class="code-block"><pre><code>stack = []
stack.append(10)  # Push
stack.append(20)
print(stack.pop())  # Pop - returns 20</code></pre></div>
                    <h3>4. Binary Search (O(log n))</h3>
                    <div class="code-block"><pre><code>def binary_search(arr, target):
    left, right = 0, len(arr)-1
    while left <= right:
        mid = (left + right) // 2
        if arr[mid] == target:
            return mid
        elif arr[mid] < target:
            left = mid + 1
        else:
            right = mid - 1
    return -1

arr = [1, 3, 5, 7, 9, 11]
print(binary_search(arr, 7))  # Output: 3</code></pre></div>
                    <h3>5. Big O Notation</h3>
                    <ul>
                        <li>O(1) - Constant Time</li>
                        <li>O(n) - Linear Time</li>
                        <li>O(log n) - Logarithmic Time</li>
                        <li>O(n²) - Quadratic Time</li>
                    </ul>
                `,
                exam: {
                    questions: [
                        { text: "What is the time complexity of Binary Search?", options: ["O(1)", "O(n)", "O(log n)", "O(n²)"], correct: 2 },
                        { text: "Which data structure uses LIFO (Last In First Out)?", options: ["Queue", "Stack", "Array", "Linked List"], correct: 1 },
                        { text: "What is the time complexity of Bubble Sort in worst case?", options: ["O(1)", "O(n)", "O(n log n)", "O(n²)"], correct: 3 },
                        { text: "Which data structure would you use for a 'first come first served' system?", options: ["Stack", "Queue", "Tree", "Hash Table"], correct: 1 },
                        { text: "What does O(1) mean?", options: ["Slow algorithm", "Linear time", "Constant time", "Exponential time"], correct: 2 }
                    ]
                }
            },
            {
                id: 2,
                title: "Python Basics",
                category: "backend",
                icon: "fab fa-python",
                description: "Learn variables, loops, functions, and data structures. Perfect for beginners!",
                duration: "2 hours",
                level: "Beginner",
                fullLesson: `
                    <h2>🐍 Python Basics</h2>
                    <h3>Your First Program</h3>
                    <div class="code-block"><pre><code>print("Hello, SkillBridge!")</code></pre></div>
                    <h3>Variables</h3>
                    <div class="code-block"><pre><code>name = "Alice"
age = 25
height = 5.7
is_student = True

print(f"My name is {name} and I am {age} years old")</code></pre></div>
                    <h3>If Statements</h3>
                    <div class="code-block"><pre><code>age = 18
if age >= 18:
    print("You can vote!")
else:
    print("Too young to vote")</code></pre></div>
                    <h3>Loops</h3>
                    <div class="code-block"><pre><code>for i in range(5):
    print(f"Count: {i}")

fruits = ["apple", "banana", "cherry"]
for fruit in fruits:
    print(fruit)</code></pre></div>
                    <h3>Functions</h3>
                    <div class="code-block"><pre><code>def greet(name):
    return f"Hello, {name}!"

print(greet("Sarah"))</code></pre></div>
                `,
                exam: {
                    questions: [
                        { text: "What is the correct way to print 'Hello World' in Python?", options: ["print('Hello World')", "console.log('Hello World')", "echo 'Hello World'", "System.out.println('Hello World')"], correct: 0 },
                        { text: "Which of the following is a valid variable name in Python?", options: ["2myVar", "my-var", "my_var", "my var"], correct: 2 },
                        { text: "What does the 'if' statement do?", options: ["Repeats code", "Makes decisions", "Stores data", "Creates a function"], correct: 1 },
                        { text: "How do you create a function in Python?", options: ["function myFunc():", "def myFunc():", "create myFunc():", "new myFunc():"], correct: 1 },
                        { text: "What is the output of: print(10 % 3)?", options: ["3", "3.33", "1", "0"], correct: 2 }
                    ]
                }
            },
            {
                id: 3,
                title: "HTML Structure",
                category: "frontend",
                icon: "fab fa-html5",
                description: "Build web pages with semantic HTML, forms, and modern layout techniques.",
                duration: "2.5 hours",
                level: "Beginner",
                fullLesson: `
                    <h2>🌐 HTML Structure</h2>
                    <h3>Basic Template</h3>
                    <div class="code-block"><pre><code>&lt;!DOCTYPE html&gt;
&lt;html&gt;
&lt;head&gt;
    &lt;title&gt;My Page&lt;/title&gt;
&lt;/head&gt;
&lt;body&gt;
    &lt;h1&gt;Hello World!&lt;/h1&gt;
    &lt;p&gt;This is a paragraph.&lt;/p&gt;
&lt;/body&gt;
&lt;/html&gt;</code></pre></div>
                    <h3>Common Tags</h3>
                    <div class="code-block"><pre><code>&lt;h1&gt;Main Heading&lt;/h1&gt;
&lt;p&gt;Paragraph text&lt;/p&gt;
&lt;a href="https://google.com"&gt;Link&lt;/a&gt;
&lt;img src="photo.jpg" alt="Description"&gt;
&lt;button&gt;Click Me&lt;/button&gt;

&lt;ul&gt;
    &lt;li&gt;Item 1&lt;/li&gt;
    &lt;li&gt;Item 2&lt;/li&gt;
&lt;/ul&gt;</code></pre></div>
                `,
                exam: {
                    questions: [
                        { text: "What does HTML stand for?", options: ["Hyper Text Markup Language", "High Tech Modern Language", "Hyper Transfer Markup Language", "Home Tool Markup Language"], correct: 0 },
                        { text: "Which tag is used for the main heading?", options: ["<heading>", "<h1>", "<head>", "<header>"], correct: 1 },
                        { text: "How do you create a link?", options: ["<a href='url'>", "<link url>", "<href>", "<url>"], correct: 0 },
                        { text: "Which tag is used for an image?", options: ["<img>", "<td>", "<pic>", "<src>"], correct: 0 },
                        { text: "What does <p> tag do?", options: ["Creates a paragraph", "Creates a link", "Creates an image", "Creates a heading"], correct: 0 }
                    ]
                }
            },
            {
                id: 4,
                title: "CSS Design",
                category: "frontend",
                icon: "fab fa-css3-alt",
                description: "Style beautiful websites with colors, layouts, animations, and responsive design.",
                duration: "3 hours",
                level: "Beginner",
                fullLesson: `
                    <h2>🎨 CSS Design</h2>
                    <h3>Basic Syntax</h3>
                    <div class="code-block"><pre><code>h1 {
    color: #4ecdc4;
    font-size: 32px;
    text-align: center;
}</code></pre></div>
                    <h3>Box Model</h3>
                    <div class="code-block"><pre><code>.card {
    width: 300px;
    padding: 20px;
    margin: 10px;
    border: 2px solid #4ecdc4;
    border-radius: 10px;
}</code></pre></div>
                    <h3>Flexbox</h3>
                    <div class="code-block"><pre><code>.container {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}</code></pre></div>
                `,
                exam: {
                    questions: [
                        { text: "What does CSS stand for?", options: ["Creative Style Sheets", "Computer Style Sheets", "Cascading Style Sheets", "Colorful Style Sheets"], correct: 2 },
                        { text: "How do you select an element with class 'box'?", options: [".box", "#box", "box", "*box"], correct: 0 },
                        { text: "Which property changes text color?", options: ["text-color", "font-color", "color", "bgcolor"], correct: 2 },
                        { text: "What does 'display: flex' do?", options: ["Creates a flexible layout", "Hides the element", "Makes text bold", "Adds border"], correct: 0 },
                        { text: "Which unit is responsive?", options: ["px", "pt", "in", "%"], correct: 3 }
                    ]
                }
            },
            {
                id: 5,
                title: "JavaScript Essentials",
                category: "frontend",
                icon: "fab fa-js",
                description: "Make websites interactive with variables, functions, and DOM manipulation.",
                duration: "2 hours",
                level: "Beginner",
                fullLesson: `
                    <h2>📜 JavaScript Essentials</h2>
                    <h3>Variables</h3>
                    <div class="code-block"><pre><code>let name = "John";
const age = 25;
var city = "New York";

console.log(name);</code></pre></div>
                    <h3>Functions</h3>
                    <div class="code-block"><pre><code>function greet(name) {
    return "Hello " + name;
}

const result = greet("Alice");
console.log(result);</code></pre></div>
                    <h3>DOM Manipulation</h3>
                    <div class="code-block"><pre><code>document.getElementById("myButton").onclick = function() {
    alert("Button clicked!");
};</code></pre></div>
                `,
                exam: {
                    questions: [
                        { text: "How do you write 'Hello World' in an alert box?", options: ["msg('Hello World')", "alert('Hello World')", "console.log('Hello World')", "prompt('Hello World')"], correct: 1 },
                        { text: "How do you declare a variable in JavaScript?", options: ["var myVar", "v myVar", "variable myVar", "declare myVar"], correct: 0 },
                        { text: "What does '===' do?", options: ["Assignment", "Compares value and type", "Compares only value", "Not equal"], correct: 1 },
                        { text: "Which is NOT a JavaScript data type?", options: ["String", "Boolean", "Float", "Number"], correct: 2 },
                        { text: "How do you create a function?", options: ["function:myFunc()", "def myFunc()", "function myFunc()", "create myFunc()"], correct: 2 }
                    ]
                }
            },
            {
                id: 6,
                title: "Java Fundamentals",
                category: "backend",
                icon: "fab fa-java",
                description: "Learn object-oriented programming, classes, and methods in Java.",
                duration: "3.5 hours",
                level: "Intermediate",
                fullLesson: `
                    <h2>☕ Java Fundamentals</h2>
                    <h3>First Program</h3>
                    <div class="code-block"><pre><code>public class Main {
    public static void main(String[] args) {
        System.out.println("Hello, SkillBridge!");
    }
}</code></pre></div>
                    <h3>Variables</h3>
                    <div class="code-block"><pre><code>String name = "Alice";
int age = 25;
double price = 19.99;
boolean isStudent = true;</code></pre></div>
                    <h3>If Statements</h3>
                    <div class="code-block"><pre><code>if (age >= 18) {
    System.out.println("Adult");
} else {
    System.out.println("Minor");
}</code></pre></div>
                `,
                exam: {
                    questions: [
                        { text: "What is the entry point of a Java program?", options: ["main()", "start()", "run()", "init()"], correct: 0 },
                        { text: "Which keyword is used to create a class?", options: ["class", "struct", "object", "type"], correct: 0 },
                        { text: "How do you print to console in Java?", options: ["console.log()", "print()", "System.out.println()", "echo()"], correct: 2 },
                        { text: "What is OOP?", options: ["Object Oriented Programming", "Online Operating Protocol", "Output Optimization Process", "Object Output Program"], correct: 0 },
                        { text: "Which keyword means 'this class inherits from'?", options: ["inherits", "extends", "implements", "super"], correct: 1 }
                    ]
                }
            },
            {
                id: 7,
                title: "SQL Database",
                category: "database",
                icon: "fas fa-database",
                description: "Query and manage databases with SQL. Learn SELECT, INSERT, UPDATE, and JOIN.",
                duration: "2 hours",
                level: "Intermediate",
                fullLesson: `
                    <h2>🗄️ SQL Database</h2>
                    <h3>SELECT Statement</h3>
                    <div class="code-block"><pre><code>SELECT * FROM users;
SELECT name, email FROM users WHERE age > 18;</code></pre></div>
                    <h3>INSERT Data</h3>
                    <div class="code-block"><pre><code>INSERT INTO users (name, email) VALUES ('John', 'john@email.com');</code></pre></div>
                    <h3>UPDATE Data</h3>
                    <div class="code-block"><pre><code>UPDATE users SET age = 26 WHERE name = 'John';</code></pre></div>
                    <h3>DELETE Data</h3>
                    <div class="code-block"><pre><code>DELETE FROM users WHERE id = 5;</code></pre></div>
                `,
                exam: {
                    questions: [
                        { text: "What does SQL stand for?", options: ["Structured Query Language", "Simple Query Language", "Standard Query Language", "System Query Language"], correct: 0 },
                        { text: "Which command retrieves data?", options: ["GET", "SELECT", "FETCH", "RETRIEVE"], correct: 1 },
                        { text: "How to filter results?", options: ["WHERE", "FILTER", "HAVING", "CONDITION"], correct: 0 },
                        { text: "Which command adds new data?", options: ["ADD", "INSERT", "CREATE", "UPDATE"], correct: 1 },
                        { text: "What does 'SELECT * FROM users' do?", options: ["Selects all columns", "Selects first column", "Deletes table", "Creates table"], correct: 0 }
                    ]
                }
            }
        ];

        // ========== FAVORITES ==========
        let favorites = JSON.parse(localStorage.getItem('skillbridge_favorites')) || [];

        function isFavorite(id) {
            return favorites.some(fav => fav.id === id);
        }

        function saveFavorites() {
            localStorage.setItem('skillbridge_favorites', JSON.stringify(favorites));
            updateFavCount();
        }

        function updateFavCount() {
            const badge = document.getElementById('favCountBadge');
            if (badge) badge.textContent = favorites.length;
        }

        function addToFavorites(id, tutorial) {
            if (isFavorite(id)) {
                favorites = favorites.filter(fav => fav.id !== id);
                showNotification(`❌ Removed "${tutorial.title}" from favorites`, 'info');
            } else {
                favorites.push({
                    id: id,
                    name: tutorial.title,
                    icon: tutorial.icon,
                    level: tutorial.level,
                    description: tutorial.description
                });
                showNotification(`❤️ Added "${tutorial.title}" to favorites!`, 'success');
            }
            saveFavorites();
            renderTutorials();
        }

        function openFavoritesModal() {
            const container = document.getElementById('favoritesList');
            if (favorites.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:2rem;"><i class="fas fa-heart-broken" style="font-size:3rem;"></i><p>No favorites yet</p><p>Click the ❤️ heart on any tutorial to save it!</p></div>`;
            } else {
                container.innerHTML = favorites.map(fav => `
                    <div style="display: flex; align-items: center; justify-content: space-between; padding: 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.1);">
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <i class="${fav.icon}" style="font-size: 1.5rem; color: #4ecdc4;"></i>
                            <div>
                                <strong>${fav.name}</strong>
                                <p style="font-size: 0.7rem; color: #888;">${fav.level}</p>
                            </div>
                        </div>
                        <button onclick="viewLessonFromFav(${fav.id})" style="background: none; border: none; color: #4ecdc4; cursor: pointer;"><i class="fas fa-eye"></i></button>
                    </div>
                `).join('');
            }
            document.getElementById('favoritesModal').style.display = 'flex';
        }

        function closeFavoritesModal() {
            document.getElementById('favoritesModal').style.display = 'none';
        }

        function viewLessonFromFav(id) {
            const tutorial = tutorials.find(t => t.id === id);
            if (tutorial) {
                document.getElementById('lessonTitle').innerHTML = `${tutorial.title} - Complete Lesson`;
                document.getElementById('lessonContent').innerHTML = tutorial.fullLesson;
                document.getElementById('lessonModal').style.display = 'flex';
                closeFavoritesModal();
            }
        }

        // ========== EXAM RESULTS ==========
        let examResults = JSON.parse(localStorage.getItem('skillbridge_examResults')) || {};

        // ========== RENDER TUTORIALS ==========
        let currentCategory = 'all';
        let searchTerm = '';

        function renderTutorials() {
            const container = document.getElementById('tutorialsContainer');
            if (!container) return;
            
            let filtered = tutorials;
            if (currentCategory !== 'all') {
                filtered = tutorials.filter(t => t.category === currentCategory);
            }
            if (searchTerm) {
                filtered = filtered.filter(t => 
                    t.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    t.description.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }
            
            if (filtered.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:3rem; color:#888;">No tutorials found</div>`;
                return;
            }
            
            container.innerHTML = filtered.map(tutorial => {
                const hasPassed = examResults[tutorial.id] && examResults[tutorial.id].passed;
                return `
                <div class="tutorial-card">
                    <div class="card-image">
                        <i class="${tutorial.icon}"></i>
                        ${hasPassed ? '<span class="exam-badge" style="background:#2ecc71;">✓ Certified</span>' : '<span class="exam-badge">📝 Exam Available</span>'}
                        <div class="favorite-heart" onclick="event.stopPropagation(); addToFavorites(${tutorial.id}, ${JSON.stringify(tutorial).replace(/"/g, '&quot;')})">
                            <i class="${isFavorite(tutorial.id) ? 'fas fa-heart' : 'far fa-heart'}" style="color: #ff6b6b;"></i>
                        </div>
                    </div>
                    <div class="card-content">
                        <h3 class="card-title">${tutorial.title}</h3>
                        <span class="level-badge">${tutorial.level}</span>
                        <p class="card-description">${tutorial.description}</p>
                        <div class="card-footer">
                            <span class="duration"><i class="far fa-clock"></i> ${tutorial.duration}</span>
                            <div>
                                <button class="start-btn" onclick="openLesson(${tutorial.id})">📖 Learn</button>
                                <button class="exam-btn" onclick="openExam(${tutorial.id})">📝 Exam</button>
                            </div>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        // ========== OPEN LESSON ==========
        function openLesson(id) {
            const tutorial = tutorials.find(t => t.id === id);
            if (tutorial) {
                document.getElementById('lessonTitle').innerHTML = `${tutorial.title} - Complete Lesson`;
                document.getElementById('lessonContent').innerHTML = tutorial.fullLesson;
                document.getElementById('lessonModal').style.display = 'flex';
            }
        }

        function closeLessonModal() {
            document.getElementById('lessonModal').style.display = 'none';
        }

        // ========== OPEN EXAM ==========
        let currentExamId = null;
        let userAnswers = {};

        function openExam(id) {
            const tutorial = tutorials.find(t => t.id === id);
            if (!tutorial || !tutorial.exam) return;
            
            currentExamId = id;
            userAnswers = {};
            
            const exam = tutorial.exam;
            let examHTML = `<div class="quiz-container">`;
            examHTML += `<p><strong>Course:</strong> ${tutorial.title}</p>`;
            examHTML += `<p><strong>Questions:</strong> ${exam.questions.length}</p>`;
            examHTML += `<p><strong>Passing Score:</strong> 60% (${Math.ceil(exam.questions.length * 0.6)}/${exam.questions.length} correct)</p>`;
            examHTML += `<hr style="margin:1rem 0;">`;
            
            exam.questions.forEach((q, idx) => {
                examHTML += `
                    <div class="question">
                        <div class="question-text">${idx + 1}. ${q.text}</div>
                        ${q.options.map((opt, optIdx) => `
                            <label class="option">
                                <input type="radio" name="q${idx}" value="${optIdx}" onchange="saveAnswer(${idx}, ${optIdx})">
                                ${opt}
                            </label>
                        `).join('')}
                    </div>
                `;
            });
            
            examHTML += `<button class="submit-exam-btn" onclick="submitExam()">Submit Exam & Get Score</button>`;
            examHTML += `<div id="examResult"></div></div>`;
            
            document.getElementById('examTitle').innerHTML = `<i class="fas fa-pencil-alt"></i> ${tutorial.title} Exam`;
            document.getElementById('examContent').innerHTML = examHTML;
            document.getElementById('examModal').style.display = 'flex';
        }

        function saveAnswer(questionIndex, answerIndex) {
            userAnswers[questionIndex] = answerIndex;
        }

        function submitExam() {
            const tutorial = tutorials.find(t => t.id === currentExamId);
            if (!tutorial || !tutorial.exam) return;
            
            const exam = tutorial.exam;
            let score = 0;
            
            exam.questions.forEach((q, idx) => {
                if (userAnswers[idx] === q.correct) {
                    score++;
                }
            });
            
            const percentage = (score / exam.questions.length) * 100;
            const passed = percentage >= 60;
            
            // Save result
            examResults[currentExamId] = {
                score: score,
                total: exam.questions.length,
                percentage: percentage,
                passed: passed,
                date: new Date().toLocaleString()
            };
            localStorage.setItem('skillbridge_examResults', JSON.stringify(examResults));
            
            // Display result
            const resultDiv = document.getElementById('examResult');
            if (passed) {
                resultDiv.innerHTML = `
                    <div class="result-area result-pass">
                        <i class="fas fa-trophy" style="font-size:3rem; color:#f1c40f;"></i>
                        <div class="score-text">${score}/${exam.questions.length} (${percentage}%)</div>
                        <h3>🎉 CONGRATULATIONS! YOU PASSED! 🎉</h3>
                        <div class="certificate">
                            <i class="fas fa-certificate gold"></i>
                            <h3>Certificate of Completion</h3>
                            <p>This certifies that you have successfully completed the</p>
                            <h2>${tutorial.title}</h2>
                            <p>with a score of ${score}/${exam.questions.length} (${percentage}%)</p>
                            <p><small>Date: ${new Date().toLocaleString()}</small></p>
                        </div>
                        <button class="submit-exam-btn" onclick="closeExamModal(); renderTutorials();" style="margin-top:1rem;">Close</button>
                    </div>
                `;
                createConfetti();
            } else {
                resultDiv.innerHTML = `
                    <div class="result-area result-fail">
                        <i class="fas fa-frown" style="font-size:3rem;"></i>
                        <div class="score-text">${score}/${exam.questions.length} (${percentage}%)</div>
                        <h3>😔 Sorry, You Did Not Pass</h3>
                        <p>You need ${Math.ceil(exam.questions.length * 0.6)} correct answers to pass.</p>
                        <p>Review the lesson and try again!</p>
                        <button class="submit-exam-btn" onclick="closeExamModal()" style="margin-top:1rem;">Close</button>
                    </div>
                `;
            }
            renderTutorials();
        }

        function createConfetti() {
            for(let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.innerHTML = ['🎉', '🎊', '⭐', '🏆', '📜'][Math.floor(Math.random() * 5)];
                confetti.style.position = 'fixed';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.top = '-20px';
                confetti.style.fontSize = (Math.random() * 20 + 10) + 'px';
                confetti.style.pointerEvents = 'none';
                confetti.style.zIndex = '9999';
                confetti.style.animation = `confetti ${Math.random() * 2 + 2}s linear forwards`;
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 3000);
            }
        }

        function closeExamModal() {
            document.getElementById('examModal').style.display = 'none';
        }

        function showNotification(message, type) {
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.innerHTML = message;
            notif.style.background = type === 'success' ? '#4ecdc4' : '#ffa502';
            notif.style.color = '#1a1a2e';
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 2000);
        }

        // ========== FILTER AND SEARCH ==========
        function setupFilters() {
            const filters = document.querySelectorAll('.filter-chip');
            filters.forEach(chip => {
                chip.addEventListener('click', function() {
                    filters.forEach(c => c.classList.remove('active'));
                    this.classList.add('active');
                    currentCategory = this.dataset.category;
                    renderTutorials();
                });
            });
            
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    searchTerm = e.target.value;
                    renderTutorials();
                });
            }
        }

        // ========== AUTH FUNCTIONS ==========
        let users = JSON.parse(localStorage.getItem('skillbridge_users')) || [];
        let currentUser = localStorage.getItem('skillbridge_currentUser') || null;

        function updateAuthUI() {
            const authBtn = document.getElementById('authButton');
            if (currentUser) {
                authBtn.innerHTML = `<i class="fas fa-user"></i> ${currentUser}`;
                authBtn.onclick = logout;
            } else {
                authBtn.innerHTML = `<i class="fas fa-sign-in-alt"></i> Login`;
                authBtn.onclick = showAuthModal;
            }
        }

        function showAuthModal() {
            document.getElementById('authModal').style.display = 'flex';
        }

        function closeAuthModal() {
            document.getElementById('authModal').style.display = 'none';
        }

        function showLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('signupForm').style.display = 'none';
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
            document.querySelectorAll('.tab-btn')[1].classList.remove('active');
        }

        function showSignup() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('signupForm').style.display = 'block';
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
            document.querySelectorAll('.tab-btn')[0].classList.remove('active');
        }

        function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const user = users.find(u => u.username === username && u.password === password);
            
            if (user) {
                currentUser = username;
                localStorage.setItem('skillbridge_currentUser', currentUser);
                updateAuthUI();
                closeAuthModal();
                showNotification(`Welcome back, ${username}! 🎉`, 'success');
                document.getElementById('loginUsername').value = '';
                document.getElementById('loginPassword').value = '';
            } else {
                alert('Invalid username or password!');
            }
        }

        function signup() {
            const username = document.getElementById('signupUsername').value.trim();
            const password = document.getElementById('signupPassword').value;
            
            if (!username || !password) {
                alert('Please fill in all fields');
                return;
            }
            
            if (username.length < 3) {
                alert('Username must be at least 3 characters');
                return;
            }
            
            if (password.length < 4) {
                alert('Password must be at least 4 characters');
                return;
            }
            
            if (users.find(u => u.username === username)) {
                alert('Username already exists! Try another one.');
                return;
            }
            
            users.push({ username, password });
            localStorage.setItem('skillbridge_users', JSON.stringify(users));
            alert('✅ Account created successfully! Please login.');
            showLogin();
            document.getElementById('signupUsername').value = '';
            document.getElementById('signupPassword').value = '';
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('skillbridge_currentUser');
            updateAuthUI();
            showNotification('Logged out successfully!', 'info');
        }

        function toggleMenu() {
            document.querySelector('.nav-links').classList.toggle('show');
        }

        window.onclick = function(event) {
            const authModal = document.getElementById('authModal');
            const lessonModal = document.getElementById('lessonModal');
            const examModal = document.getElementById('examModal');
            const favModal = document.getElementById('favoritesModal');
            if (event.target === authModal) closeAuthModal();
            if (event.target === lessonModal) closeLessonModal();
            if (event.target === examModal) closeExamModal();
            if (event.target === favModal) closeFavoritesModal();
        };

        // Initialize
        renderTutorials();
        setupFilters();
        updateAuthUI();
        updateFavCount();
    </script>
</body>
</html>
